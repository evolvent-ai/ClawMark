# UniAlign - Table 1 Main Experiments Configuration
# Reproduces all results in Table 1 of the paper

model:
  name: unialign
  backbone: vit_large_patch16_224  # ViT-L/16
  text_encoder: roberta-large
  cross_attn_heads: 12
  cross_attn_layers: 6
  contrastive_tau: 0.07  # Temperature for Eq.(3)
  modality_routing: true
  visual_prompt: true
  data_augment: true

data:
  datasets:
    - mscoco
    - flickr30k
    - vqa_v2
    - refcoco
    - snli_ve
  train_split: train
  val_split: val
  test_split: test
  max_text_len: 128
  image_size: 224

training:
  epochs: 30
  batch_size: 64
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  lr_scheduler: cosine_with_restarts
  gradient_clip: 1.0
  eval_interval: 1
  save_best: true
  fp16: true

hardware:
  gpus: 4
  gpu_type: A100-80GB
  distributed: ddp
