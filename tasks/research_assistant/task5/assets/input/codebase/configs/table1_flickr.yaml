experiment:
  name: table1_flickr30k
  description: Main experiment - Flickr30k dataset

model:
  vision_model: openai/clip-vit-large-patch14
  hidden_size: 768
  num_heads: 12
  num_cross_layers: 4
  num_visual_prompts: 16
  proj_size: 256
  contrastive_weight: 0.1

data:
  dataset: flickr30k
  data_dir: ./data/flickr30k
  image_size: 224
  max_length: 77

training:
  batch_size: 64
  num_epochs: 15
  learning_rate: 2e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  fp16: true
  seed: 42

evaluation:
  eval_every: 500
  metric: bleu
  save_best: true

logging:
  log_every: 100
  wandb_project: unialign
  run_name: table1_flickr30k
